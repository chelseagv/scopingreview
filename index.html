
    <section id="contact" class="border-t border-slate-200 bg-white">
      <div class="mx-auto max-w-3xl px-4 py-16 sm:px-6 lg:px-8">
        <h2 class="text-3xl font-bold text-slate-900">Contact Us</h2>
        <p class="mt-3 text-slate-600">
          Have questions or want a custom solution? Send us a message and we will get back to you shortly.
        </p>
        <form class="mt-8 grid gap-5 sm:grid-cols-2">
          <div class="sm:col-span-1">
            <label for="first-name" class="mb-2 block text-sm font-medium text-slate-700">First Name</label>
            <input id="first-name" type="text" placeholder="Jane" class="w-full rounded-lg border border-slate-300 px-4 py-3 text-slate-900 shadow-sm outline-none transition placeholder:text-slate-400 focus:border-brand-500 focus:ring-2 focus:ring-brand-100">
          </div>
          <div class="sm:col-span-1">
            <label for="last-name" class="mb-2 block text-sm font-medium text-slate-700">Last Name</label>
            <input id="last-name" type="text" placeholder="Doe" class="w-full rounded-lg border border-slate-300 px-4 py-3 text-slate-900 shadow-sm outline-none transition placeholder:text-slate-400 focus:border-brand-500 focus:ring-2 focus:ring-brand-100">
          </div>
          <div class="sm:col-span-2">
            <label for="email" class="mb-2 block text-sm font-medium text-slate-700">Email</label>
            <input id="email" type="email" placeholder="you@example.com" class="w-full rounded-lg border border-slate-300 px-4 py-3 text-slate-900 shadow-sm outline-none transition placeholder:text-slate-400 focus:border-brand-500 focus:ring-2 focus:ring-brand-100">
          </div>
          <div class="sm:col-span-2">
            <label for="message" class="mb-2 block text-sm font-medium text-slate-700">Message</label>
            <textarea id="message" rows="5" placeholder="Tell us about your project..." class="w-full rounded-lg border border-slate-300 px-4 py-3 text-slate-900 shadow-sm outline-none transition placeholder:text-slate-400 focus:border-brand-500 focus:ring-2 focus:ring-brand-100"></textarea>
          </div>
          <div class="sm:col-span-2">
            <button type="submit" class="w-full rounded-lg bg-brand-600 px-6 py-3 text-sm font-semibold text-white transition hover:bg-brand-700">
              Send Message
            </button>
          </div>
        </form>
      </div>
    </section>
  </main>
</body>
